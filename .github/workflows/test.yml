name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline tool tests
        env:
          DEEPSEEK_API_KEY: dummy_key_for_tests
          TELEGRAM_BOT_TOKEN: dummy_token
          TELEGRAM_CHAT_ID: "0"
        run: python test_demo.py
